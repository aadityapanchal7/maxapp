# Authoritative product catalog.
#
# Every product the bot can recommend lives here. Each entry must have a
# DIRECT product URL (not a search). The catalog is the only source for
# LLM recommendations — the agent's `recommend_product` tool reads from
# here, the link rewriter resolves brand mentions against here, and the
# link validator (downstream) rejects URLs not in the catalog.
#
# Adding a product:
#   1. Verify it aligns with the module's coaching docs (rag_content/).
#   2. Pick a stable direct URL (Amazon /dp/<ASIN>/ is preferred — the
#      brand site is acceptable when ASIN can't be confirmed).
#   3. Tag fact-flags accurately. The catalog filter trusts these to
#      drop products the user's facts say to avoid.
#   4. Cite the doc(s) that endorse the type of product in `references`.
#
# Schema (all strings unless noted):
#   id            stable kebab-case slug, unique
#   name          display name shown to user
#   brand         brand the user knows
#   module        skinmax | hairmax | fitmax | heightmax | bonemax | general
#   concerns      [str]  the conditions / goals this addresses (e.g. acne,
#                        dryness, hair_loss, protein, posture)
#   url           DIRECT product page URL (NEVER a search query)
#   price_tier    budget | mid | premium
#   tags          dict of fact-flags (true/false/null=unknown):
#                   vegetarian / vegan / fragrance_free / sulfate_free
#                   gluten_free / dairy_free / cruelty_free
#   rationale     one short sentence on why it's recommended (≤120 chars)
#   references    [str] paths under rag_content/ that endorse it

